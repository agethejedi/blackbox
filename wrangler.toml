name = "project-black-box-api"
main = "worker/index.ts"
compatibility_date = "2026-06-25"

[[d1_databases]]
binding = "DB"
database_name = "blackbox-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "blackbox-uploads"

[[kv_namespaces]]
binding = "CONFIG"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
